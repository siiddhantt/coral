name: Post release to Discord

on:
  release:
    types: [published]

permissions: {}

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          TAG_NAME: ${{ github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          MAX_LEN=3500
          BODY="$RELEASE_BODY"
          if [ ${#BODY} -gt $MAX_LEN ]; then
            BODY="${BODY:0:$MAX_LEN}..."
          fi

          TITLE_MAX_LEN=256
          TITLE="🪸 ${RELEASE_NAME:-$TAG_NAME}"
          if [ ${#TITLE} -gt $TITLE_MAX_LEN ]; then
            TITLE="${TITLE:0:$((TITLE_MAX_LEN - 3))}..."
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$BODY" \
            --arg url "$RELEASE_URL" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 16744272,
                footer: { text: "Fresh from the reef" }
              }]
            }' | curl -sf -H "Content-Type: application/json" -d @- "$DISCORD_WEBHOOK"
