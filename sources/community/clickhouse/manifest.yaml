          input: iso8601
          expr:
            kind: path
            path:
              - last_queue_update
      - name: replica_name
        type: Utf8
        nullable: true
        description: Name of this replica in ZooKeeper
        expr:
          kind: path
          path:
            - replica_name
      - name: zookeeper_path
        type: Utf8
        nullable: true
        description: Path to the table's ZooKeeper node
        expr:
          kind: path
          path:
            - zookeeper_path
