  - name: payment_links
    description: List all payment links
    filters:
      - name: active
        required: false
      - name: payment_link
        required: false
    request:
      method: GET
      path: /v1/payment_links
      query:
        - name: active
          from: filter
          key: active
    requests:
      - when_filters:
          - payment_link
        method: GET
        path: /v1/payment_links/{{filter.payment_link}}
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
    columns:
      - name: active
        type: Boolean
        nullable: true
        virtual: false
        description: Whether the payment link's URL is active; if false, URL shows deactivation message.
        expr:
          kind: path
          path:
            - active
      - name: after_completion
