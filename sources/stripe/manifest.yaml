  - name: setup_intents
    description: List all SetupIntents
    filters:
      - name: attach_to_self
        required: false
      - name: created
        required: false
      - name: customer
        required: false
      - name: customer_account
        required: false
      - name: payment_method
        required: false
      - name: client_secret
        required: false
      - name: intent
        required: false
    request:
      method: GET
      path: /v1/setup_intents
      query:
        - name: attach_to_self
          from: filter
          key: attach_to_self
        - name: created
          explode: true
          from: filter
          key: created
        - name: customer
          from: filter
          key: customer
        - name: customer_account
          from: filter
          key: customer_account
        - name: payment_method
          from: filter
          key: payment_method
    requests:
      - when_filters:
          - intent
        method: GET
        path: /v1/setup_intents/{{filter.intent}}
        query:
          - name: client_secret
            from: filter
            key: client_secret
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
