  - name: readers
    description: List all Readers
    filters:
      - name: device_type
        required: false
      - name: location
        required: false
      - name: serial_number
        required: false
      - name: status
        required: false
      - name: reader
        required: false
    request:
      method: GET
      path: /v1/terminal/readers
      query:
        - name: device_type
          from: filter
          key: device_type
        - name: location
          from: filter
          key: location
        - name: serial_number
          from: filter
          key: serial_number
        - name: status
          from: filter
          key: status
    requests:
      - when_filters:
          - reader
        method: GET
        path: /v1/terminal/readers/{{filter.reader}}
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
    columns:
