  - name: webhook_endpoints
    description: List all webhook endpoints
    filters:
      - name: webhook_endpoint
        required: false
    request:
      method: GET
      path: /v1/webhook_endpoints
    requests:
      - when_filters:
          - webhook_endpoint
        method: GET
        path: /v1/webhook_endpoints/{{filter.webhook_endpoint}}
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
    columns:
      - name: api_version
        type: Utf8
        nullable: true
        virtual: false
        description: The API version events are rendered as for this webhook endpoint.
        expr:
          kind: path
          path:
            - api_version
      - name: application
        type: Utf8
        nullable: true
        virtual: false
        description: The ID of the associated Connect application.
        expr:
          kind: path
          path:
            - application
      - name: created
        type: Int64
        nullable: true
        virtual: false
        description: Time at which the object was created, measured in seconds since the Unix epoch.
        expr:
          kind: path
          path:
            - created
      - name: description
        type: Utf8
        nullable: true
        virtual: false
        description: An optional description of what the webhook is used for.
        expr:
          kind: path
          path:
            - description
      - name: enabled_events
        type: Utf8
        nullable: true
        virtual: false
        description: List of events enabled for this endpoint; ['*'] indicates all events enabled except those requiring explicit
          selection.
        expr:
          kind: path
          path:
            - enabled_events
      - name: id
        type: Utf8
        nullable: true
        virtual: false
        description: Unique identifier for the object.
        expr:
          kind: path
          path:
            - id
      - name: livemode
        type: Boolean
        nullable: true
        virtual: false
        description: Indicates whether the object exists in live mode (true) or test mode (false).
        expr:
          kind: path
          path:
            - livemode
      - name: metadata
        type: Utf8
        nullable: true
        virtual: false
        description: Key-value pairs attached to the object for storing additional structured information.
        expr:
          kind: path
          path:
            - metadata
      - name: object
        type: Utf8
        nullable: true
        virtual: false
        description: String representing the object's type.
        expr:
          kind: path
          path:
            - object
      - name: secret
        type: Utf8
        nullable: true
        virtual: false
        description: Endpoint's secret used to generate webhook signatures; only returned at creation.
        expr:
          kind: path
          path:
            - secret
      - name: status
        type: Utf8
        nullable: true
        virtual: false
        description: Status of the webhook; can be enabled or disabled.
        expr:
          kind: path
          path:
            - status
      - name: url
        type: Utf8
        nullable: true
        virtual: false
        description: The URL of the webhook endpoint.
        expr:
          kind: path
          path:
            - url
      - name: webhook_endpoint
        type: Utf8
        nullable: true
        virtual: true
        expr:
          kind: from_filter
          key: webhook_endpoint
