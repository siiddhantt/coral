  - name: issuing_cards
    description: List all cards
    filters:
      - name: cardholder
        required: false
      - name: created
        required: false
      - name: exp_month
        required: false
      - name: exp_year
        required: false
      - name: last4
        required: false
      - name: personalization_design
        required: false
      - name: status
        required: false
      - name: type
        required: false
      - name: card
        required: false
    request:
      method: GET
      path: /v1/issuing/cards
      query:
        - name: cardholder
          from: filter
          key: cardholder
        - name: created
          explode: true
          from: filter
          key: created
        - name: exp_month
          from: filter
          key: exp_month
        - name: exp_year
          from: filter
          key: exp_year
        - name: last4
          from: filter
          key: last4
        - name: personalization_design
          from: filter
          key: personalization_design
        - name: status
          from: filter
          key: status
        - name: type
          from: filter
          key: type
    requests:
      - when_filters:
          - card
        method: GET
        path: /v1/issuing/cards/{{filter.card}}
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
    columns:
