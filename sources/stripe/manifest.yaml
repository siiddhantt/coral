    description: List all shipping rates
    filters:
      - name: active
        required: false
      - name: created
        required: false
      - name: currency
        required: false
      - name: shipping_rate_token
        required: false
    request:
      method: GET
      path: /v1/shipping_rates
      query:
        - name: active
