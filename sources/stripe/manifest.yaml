  - name: charges
    description: List all charges
    filters:
      - name: created
        required: false
      - name: customer
        required: false
      - name: payment_intent
        required: false
      - name: transfer_group
        required: false
      - name: charge
        required: false
    request:
      method: GET
      path: /v1/charges
      query:
        - name: created
          explode: true
          from: filter
          key: created
        - name: customer
          from: filter
          key: customer
        - name: payment_intent
          from: filter
          key: payment_intent
        - name: transfer_group
          from: filter
          key: transfer_group
    requests:
      - when_filters:
          - charge
        method: GET
        path: /v1/charges/{{filter.charge}}
    response:
      rows_path:
        - data
      allow_404_empty: false
      row_strategy: direct
    pagination:
      mode: auto
      page_start: 0
      page_step: 1
      offset_start: 0
      link_header_require_results: false
    columns:
      - name: amount
        type: Int64
        nullable: true
        virtual: false
        description: Amount intended to be collected by this payment.
        expr:
          kind: path
          path:
            - amount
      - name: amount_captured
        type: Int64
        nullable: true
        virtual: false
        description: Amount in cents (or local equivalent) captured (can be less than the amount attribute on the charge if
          a partial capture was made).
        expr:
          kind: path
          path:
            - amount_captured
      - name: amount_refunded
        type: Int64
        nullable: true
        virtual: false
        description: Amount in cents (or local equivalent) refunded (can be less than the amount attribute on the charge if
          a partial refund was issued).
        expr:
          kind: path
          path:
            - amount_refunded
      - name: application
