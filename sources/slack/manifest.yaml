name: slack
version: 2.0.0
dsl_version: 3
backend: http
description: >-
  Query channels, messages, and users from your Slack workspace.
inputs:
  SLACK_TOKEN:
    kind: secret
    hint: |
      Slack doesn't provide a general-purpose API for reading messages.
      Instead, you need a Slack app with a Bot User OAuth Token.

      If you already have a Slack app with the required scopes, you can
      find your Bot User OAuth Token on its OAuth & Permissions page. The
      required scopes are: channels:read, channels:history, groups:read,
      groups:history, users:read, users:read.email.

      If you don't have a Slack app, you can
      [create one with the required scopes pre-filled](https://api.slack.com/apps?new_app=1&manifest_json=%7B%22display_information%22%3A%7B%22name%22%3A%22Coral%22%2C%22description%22%3A%22Coral+data+access%22%7D%2C%22oauth_config%22%3A%7B%22scopes%22%3A%7B%22bot%22%3A%5B%22channels%3Aread%22%2C%22groups%3Aread%22%2C%22channels%3Ahistory%22%2C%22groups%3Ahistory%22%2C%22users%3Aread%22%2C%22users%3Aread.email%22%5D%7D%7D%2C%22features%22%3A%7B%22bot_user%22%3A%7B%22display_name%22%3A%22Coral%22%2C%22always_online%22%3Afalse%7D%7D%7D).

      For more details, see the [Slack app setup guide](https://docs.slack.dev/app-management/quickstart-app-settings).
base_url: https://slack.com
auth:
  headers:
    - name: Authorization
      from: template
      template: Bearer {{input.SLACK_TOKEN}}
test_queries:
  - SELECT * FROM slack.channels LIMIT 1
tables:
  - name: channels
    description: Slack channels with topic, purpose, and member count
    request:
      method: GET
      path: /api/conversations.list
      query:
        - name: types
          from: literal
          value: public_channel,private_channel
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - channels
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Channel ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Channel name
        expr:
          kind: path
          path:
            - name
      - name: topic
        type: Utf8
        nullable: true
        description: Channel topic text
        expr:
          kind: path
          path:
            - topic
            - value
      - name: purpose
        type: Utf8
        nullable: true
        description: Channel purpose text
        expr:
          kind: path
          path:
            - purpose
            - value
      - name: num_members
        type: Int64
        nullable: true
        description: Number of members in the channel
        expr:
          kind: path
          path:
            - num_members
      - name: is_archived
        type: Boolean
        nullable: false
        description: Whether the channel is archived
        expr:
          kind: path
          path:
            - is_archived
      - name: created
        type: Int64
        nullable: false
        description: Unix timestamp when the channel was created
        expr:
          kind: path
          path:
            - created
  - name: messages
    description: Messages in a Slack channel (requires channel filter)
    request:
      method: GET
      path: /api/conversations.history
      query:
        - name: channel
          from: filter
          key: channel
        - name: oldest
          from: filter
          key: oldest
        - name: latest
          from: filter
          key: latest
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - messages
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: channel
        type: Utf8
        nullable: false
        description: Channel ID (required filter to specify which channel)
        expr:
          kind: from_filter
          key: channel
      - name: user_id
        type: Utf8
        nullable: true
        description: User ID of the message author
        expr:
          kind: path
          path:
            - user
      - name: text
        type: Utf8
        nullable: true
        description: Message text content
        expr:
          kind: path
          path:
            - text
      - name: ts
        type: Timestamp
        nullable: false
        description: Message time from Slack `ts`, exposed as a UTC Timestamp
        expr:
          kind: format_timestamp
          input: seconds
          expr:
            kind: path
            path:
              - ts
      - name: permalink
        type: Utf8
        nullable: false
        description: Deep link to the message in Slack
        expr:
          kind: template
          template: "https://slack.com/archives/{{filter.channel}}/p{{expr.ts_id}}"
          values:
            ts_id:
              kind: replace
              expr:
                kind: path
                path:
                  - ts
              from: "."
              to: ""
      - name: thread_ts
        type: Utf8
        nullable: true
        description: Thread parent timestamp (null if not in a thread)
        expr:
          kind: path
          path:
            - thread_ts
      - name: reply_count
        type: Int64
        nullable: true
        description: Number of replies in thread
        expr:
          kind: path
          path:
            - reply_count
      - name: subtype
        type: Utf8
        nullable: true
        description: Message subtype
        expr:
          kind: path
          path:
            - subtype
      - name: oldest
        type: Utf8
        nullable: true
        description: Oldest timestamp filter (virtual)
        expr:
          kind: "null"
        virtual: true
      - name: latest
        type: Utf8
        nullable: true
        description: Latest timestamp filter (virtual)
        expr:
          kind: "null"
        virtual: true
    filters:
      - name: channel
        required: true
      - name: oldest
      - name: latest
  - name: users
    description: Slack workspace users with profile info (email requires users:read.email scope)
    request:
      method: GET
      path: /api/users.list
      query: []
    response:
      ok_path:
        - ok
      error_path:
        - error
      rows_path:
        - members
    pagination:
      mode: cursor_query
      page_size:
        default: 200
        max: 200
        query_param: limit
      cursor_param: cursor
      response_cursor_path:
        - response_metadata
        - next_cursor
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: User ID
        expr:
          kind: path
          path:
            - id
      - name: name
        type: Utf8
        nullable: false
        description: Username
        expr:
          kind: path
          path:
            - name
      - name: real_name
        type: Utf8
        nullable: true
        description: User real name
        expr:
          kind: path
          path:
            - real_name
      - name: display_name
        type: Utf8
        nullable: true
        description: User display name in Slack
        expr:
          kind: path
          path:
            - profile
            - display_name
      - name: email
        type: Utf8
        nullable: true
        description: User email address (requires users:read.email scope)
        expr:
          kind: path
          path:
            - profile
            - email
      - name: is_bot
        type: Boolean
        nullable: false
        description: Whether the user is a bot
        expr:
          kind: path
          path:
            - is_bot
      - name: is_admin
        type: Boolean
        nullable: true
        description: Whether the user is a workspace admin
        expr:
          kind: path
          path:
            - is_admin
      - name: deleted
        type: Boolean
        nullable: true
        description: Whether the user account is deactivated
        expr:
          kind: path
          path:
            - deleted
