dsl_version: 3
name: confluence
version: 0.1.0
description: |
  Query spaces, pages, blog posts, comments, attachments, labels, and
  related metadata from Confluence Cloud.
backend: http
inputs:
  CONFLUENCE_BASE_URL:
    kind: variable
    hint: |
      Base URL of your Atlassian Cloud site, without the `/wiki` suffix
      (for example `https://acme.atlassian.net`).
  CONFLUENCE_BASIC_AUTH:
    kind: secret
    hint: |
      Use Base64-encoded `email:api_token` credentials for Confluence
      Cloud Basic auth.
      Create an API token at
      [Atlassian API token settings](https://id.atlassian.com/manage-profile/security/api-tokens),
      then encode `email:api_token`.
      Example: `printf '%s' 'you@example.com:YOUR_CONFLUENCE_API_TOKEN' | base64`.
base_url: "{{input.CONFLUENCE_BASE_URL}}"
auth:
  headers:
    - name: Authorization
      from: template
      template: Basic {{input.CONFLUENCE_BASIC_AUTH}}
    - name: Accept
      from: literal
      value: application/json
test_queries:
  - SELECT * FROM confluence.spaces LIMIT 1
tables:
  - name: spaces
    description: Confluence spaces visible to the authenticated user
    filters:
      - name: ids
        required: false
      - name: keys
        required: false
      - name: type
        required: false
      - name: status
        required: false
      - name: labels
        required: false
    request:
      method: GET
      path: /wiki/api/v2/spaces
      query:
        - name: ids
          from: filter
          key: ids
        - name: keys
          from: filter
          key: keys
        - name: type
          from: filter
          key: type
        - name: status
          from: filter
          key: status
        - name: labels
          from: filter
          key: labels
        - name: description-format
          from: literal
          value: plain
    response:
      rows_path:
        - results
      row_strategy: direct
    pagination:
      mode: link_header
    columns:
      - name: id
        type: Utf8
        nullable: false
        description: Space ID
        expr:
          kind: path
          path:
            - id
      - name: key
        type: Utf8
        nullable: true
        description: Space key
        expr:
          kind: path
          path:
            - key
      - name: name
        type: Utf8
        nullable: true
        description: Space name
        expr:
          kind: path
          path:
            - name
      - name: type
        type: Utf8
        nullable: true
        description: Space type (global, personal, collaboration, knowledge_base)
        expr:
          kind: path
          path:
            - type
      - name: status
        type: Utf8
        nullable: true
        description: Space status (current, archived)
        expr:
          kind: path
          path:
            - status
      - name: homepage_id
        type: Utf8
        nullable: true
        description: Homepage ID for the space
        expr:
          kind: path
          path:
            - homepageId
      - name: description_plain
        type: Utf8
        nullable: true
        description: Plain-text description value
        expr:
          kind: path
          path:
            - description
            - plain
            - value
      - name: author_id
        type: Utf8
        nullable: true
        description: Author account ID
        expr:
          kind: path
          path:
            - authorId
      - name: created_at
        type: Utf8
        nullable: true
        description: Creation timestamp
        expr:
          kind: path
          path:
            - createdAt
      - name: ids
        type: Utf8
        nullable: true
        virtual: true
        description: Optional comma-separated list of space IDs to filter by
        expr:
          kind: from_filter
          key: ids
      - name: keys
        type: Utf8
        nullable: true
        virtual: true
        description: Optional comma-separated list of space keys to filter by
        expr:
          kind: from_filter
          key: keys
      - name: labels
        type: Utf8
        nullable: true
        virtual: true
        description: Optional comma-separated list of label names to filter by
